<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanList — Clean your CSV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha384-D/t0ZMqQW31H3az8ktEiNb39wyKnS82iFY52QPACM+IjKW3jDUhyIgh2PApRqJZs" crossorigin="anonymous" defer></script>
<script src="https://cdn.jsdelivr.net/npm/fast-levenshtein@2.0.6/levenshtein.js" integrity="sha384-kbcaliuOlQsZ5aNUXD6FYL9vL6AlLdfJoY34DmzX/fHf7O/HaT1cVAYJTFxuCkNx" crossorigin="anonymous" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw" crossorigin="anonymous" defer id="xlsx-script"></script>
<style>
:root {
  --bg: #0b1120;
  --surface: #131f2e;
  --surface2: #1a2840;
  --surface3: #223050;
  --border: #2a3a52;
  --border2: #3a4f6a;
  --text: #dce8f5;
  --text2: #90a8c4;
  --text3: #58789a;
  --accent: #4e87f5;
  --accent2: #2345c5;
  --success: #2dd4a2;
  --success-bg: #0d2e26;
  --warn: #f59e0b;
  --warn-bg: #2a1f08;
  --err: #f56565;
  --err-bg: #2a1010;
  --info: #60a5fa;
  --info-bg: #0d1e35;
  --cta: linear-gradient(135deg, #4e87f5 0%, #2345c5 100%);
  --font: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ────────────────────────────────────────────────────── */
.container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

/* ── Privacy banner ─────────────────────────────────────────────── */
#privacy-banner {
  background: var(--info-bg);
  border-bottom: 1px solid #1a3a5c;
  padding: 10px 24px;
  text-align: center;
  font-size: 13px;
  color: var(--info);
}

/* ── Cookie notice ──────────────────────────────────────────────── */
#cookie-notice {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  font-size: 13px;
  color: var(--text2);
  z-index: 200;
}
#cookie-dismiss {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 12px;
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
}

/* ── Payment banner ─────────────────────────────────────────────── */
#payment-banner {
  background: var(--success-bg);
  border-bottom: 1px solid #0f4a38;
  padding: 12px 24px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--success);
}

/* ── Locked view ────────────────────────────────────────────────── */
#locked-view {
  min-height: calc(100vh - 42px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}
.locked-card {
  max-width: 420px;
  width: 100%;
  text-align: center;
}
.locked-headline {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.locked-sub {
  color: var(--text2);
  font-size: 16px;
  margin-bottom: 32px;
  line-height: 1.5;
}
.locked-actions {
  display: flex;
  gap: 12px;
  align-items: stretch;
  margin-bottom: 16px;
}
.btn-cta {
  flex: 2;
  display: block;
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 16px;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  letter-spacing: 0.01em;
}
.btn-cta:hover { opacity: 0.92; }
.restore-access-btn {
  flex: 1;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 12px 14px;
  line-height: 1.3;
  text-align: center;
}
.restore-access-btn:hover { border-color: var(--text2); color: var(--text); }

/* ── Tool view ──────────────────────────────────────────────────── */
#tool-view { padding: 32px 0 100px; }

/* ── Upload section ─────────────────────────────────────────────── */
#upload-section { }

/* Drop zone */
#drop-zone {
  border: 2px dashed var(--border2);
  background: var(--surface);
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 16px;
}
#drop-zone.dragover {
  border-color: var(--accent);
  background: var(--surface2);
}
#drop-zone p {
  color: var(--text2);
  font-size: 16px;
  pointer-events: none;
}
@media (max-width: 767px) { #drop-zone { display: none; } }

.file-btn-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.btn-select-file {
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 12px 24px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}
.btn-select-file:hover { opacity: 0.9; }
.btn-paste-toggle {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 10px 18px;
  font-family: var(--font);
  font-size: 14px;
  cursor: pointer;
  min-height: 44px;
}
.btn-paste-toggle:hover { border-color: var(--border2); color: var(--text); }

#paste-area {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 14px;
  resize: vertical;
  min-height: 120px;
  margin-bottom: 12px;
  display: none;
}
#paste-area::placeholder { color: var(--text3); }

/* File info */
#file-info {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 12px;
  display: none;
  font-family: var(--mono);
}
#file-info span { color: var(--text); font-weight: 500; }

/* Messages */
.msg {
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 10px;
  display: none;
}
.msg-err { background: var(--err-bg); border: 1px solid #4a1a1a; color: var(--err); }
.msg-warn { background: var(--warn-bg); border: 1px solid #4a3208; color: var(--warn); }
.msg-info { background: var(--info-bg); border: 1px solid #1a3a5c; color: var(--info); }
.msg-success { background: var(--success-bg); border: 1px solid #0f3a2a; color: var(--success); }

/* ── Quick Clean area ───────────────────────────────────────────── */
#quick-clean-area {
  margin-top: 24px;
  display: none;
}
#quick-clean-btn {
  width: 100%;
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 18px;
  font-family: var(--font);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.01em;
  margin-bottom: 6px;
}
#quick-clean-btn:hover { opacity: 0.92; }
.quick-clean-sub {
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  margin-bottom: 16px;
}

/* ── Advanced settings ──────────────────────────────────────────── */
.adv-toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  padding: 8px 0;
  min-height: 44px;
  user-select: none;
}
.adv-toggle-row:hover { color: var(--text); }
.adv-chevron {
  font-size: 10px;
  transition: transform 0.2s;
  display: inline-block;
}
.adv-chevron.open { transform: rotate(180deg); }

#advanced-settings {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  margin-top: 8px;
  display: none;
}
.adv-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
  margin-top: 20px;
}
.adv-section-label:first-child { margin-top: 0; }

/* Preset dropdown */
.preset-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.preset-lbl { font-size: 14px; color: var(--text2); white-space: nowrap; }
#crm-preset {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 8px 12px;
  cursor: pointer;
  flex: 1;
  min-height: 40px;
  appearance: auto;
}

/* Toggle switches */
.toggles-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
@media (max-width: 640px) { .toggles-grid { grid-template-columns: 1fr; } }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 8px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.toggle-row:hover { background: var(--surface2); }
.toggle-row input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 1px;
  height: 1px;
  margin: -1px;
  padding: 0;
  border: 0;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}
.toggle-row input[type="checkbox"]:focus-visible + .toggle-switch {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.toggle-switch {
  width: 36px;
  height: 20px;
  background: var(--border);
  border-radius: 10px;
  position: relative;
  transition: background 0.18s;
  flex-shrink: 0;
}
.toggle-row input:checked + .toggle-switch { background: var(--accent); }
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform 0.18s;
}
.toggle-row input:checked + .toggle-switch::after { transform: translateX(16px); }
.toggle-lbl { font-size: 13px; color: var(--text2); line-height: 1.3; }
.toggle-row:hover .toggle-lbl { color: var(--text); }

.btn-clean-settings {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 13px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
}
.btn-clean-settings:hover { background: var(--surface3); }

/* ── Preview section ────────────────────────────────────────────── */
#preview-section { display: none; padding-top: 8px; }

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.preview-headline {
  font-size: 20px;
  font-weight: 700;
}
.btn-start-over {
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border);
  padding: 8px 14px;
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
}
.btn-start-over:hover { color: var(--text); border-color: var(--border2); }

/* Stats block */
.stats-block {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.stat-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text2);
  font-family: var(--mono);
}
.stat-pill strong { color: var(--success); }

/* Already clean */
#already-clean-msg {
  background: var(--info-bg);
  border: 1px solid #1a3a5c;
  padding: 16px;
  color: var(--info);
  font-size: 14px;
  margin-bottom: 20px;
  display: none;
}

/* Fuzzy pairs */
#fuzzy-confirm-area {
  background: var(--surface);
  border: 1px solid var(--warn);
  padding: 20px;
  margin-bottom: 20px;
  display: none;
}
.fuzzy-hdr { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: var(--warn); }
.fuzzy-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.fuzzy-pairs-list { max-height: 240px; overflow-y: auto; margin-bottom: 16px; }
.fuzzy-pair-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.fuzzy-pair-row:last-child { border-bottom: none; }
.fuzzy-pair-row input { margin-top: 2px; flex-shrink: 0; }
.fuzzy-pair-text { color: var(--text2); line-height: 1.4; }
.fuzzy-pair-score { color: var(--text3); font-family: var(--mono); font-size: 11px; margin-left: auto; white-space: nowrap; }
.btn-fuzzy-confirm {
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 10px 20px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Preview table */
#preview-table-wrap {
  overflow-x: auto;
  margin-bottom: 12px;
}
.preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-family: var(--mono);
  min-width: 400px;
}
.preview-table th {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 8px 10px;
  text-align: left;
  color: var(--text2);
  font-weight: 500;
  white-space: nowrap;
}
.preview-table td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  color: var(--text);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.preview-table tr:nth-child(even) td { background: var(--surface); }
.preview-table .changed { background: #0d2535 !important; }
.preview-table .changed-val { color: var(--success); }

.preview-note {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 16px;
}
.show-all-toggle {
  background: none;
  border: none;
  color: var(--accent);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
  margin-left: 8px;
}

/* Process button */
#process-btn {
  width: 100%;
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 16px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
}
#process-btn:hover { opacity: 0.92; }

/* Progress bar */
#progress-wrap {
  margin-bottom: 16px;
  display: none;
}
.progress-label {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
}
.progress-bar-bg {
  height: 4px;
  background: var(--border);
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s;
}

/* Processing overlay */
#processing-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11,17,32,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
  display: none;
}
.processing-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 32px 40px;
  text-align: center;
}
.processing-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing-text { color: var(--text2); font-size: 15px; }

/* ── Download section ───────────────────────────────────────────── */
#download-section { display: none; padding-top: 8px; }

.dl-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--success);
  padding: 14px 16px;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
  font-family: var(--mono);
}
.dl-summary strong { color: var(--success); }

.btn-dl-csv {
  width: 100%;
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 16px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
}
.btn-dl-csv:hover { opacity: 0.92; }

.excel-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  margin-bottom: 24px;
}
.excel-toggle-lbl { font-size: 14px; color: var(--text2); }
.btn-dl-xlsx {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 8px 16px;
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  display: none;
  margin-left: auto;
}
.btn-dl-xlsx:hover { background: var(--surface2); }

.btn-clean-another {
  width: 100%;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 13px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.btn-clean-another:hover { background: var(--surface2); }

/* ── Feedback widget ────────────────────────────────────────────── */
#feedback-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border2);
  padding: 10px 16px;
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  z-index: 150;
  display: none;
}
#feedback-btn:hover { color: var(--text); background: var(--surface3); }

/* ── Modals ─────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11,17,32,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 400;
  padding: 24px;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 28px;
  max-width: 440px;
  width: 100%;
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 20px;
}
.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  margin-top: -4px;
  margin-right: -4px;
  line-height: 1;
  padding: 4px;
}
.modal-close:hover { color: var(--text); }
.field-row { margin-bottom: 16px; }
.field-lbl {
  display: block;
  font-size: 12px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 10px 12px;
  min-height: 40px;
}
.field-input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
textarea.field-input { resize: vertical; min-height: 100px; }
select.field-input { appearance: auto; cursor: pointer; }
.char-hint { font-size: 11px; color: var(--text3); text-align: right; margin-top: 3px; }
.btn-modal-submit {
  width: 100%;
  background: var(--cta);
  color: #fff;
  border: none;
  padding: 12px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
}
.btn-modal-submit:disabled { opacity: 0.45; cursor: not-allowed; }
.modal-msg {
  font-size: 13px;
  padding: 10px;
  margin-top: 12px;
  display: none;
}
.modal-msg.success { background: var(--success-bg); color: var(--success); border: 1px solid #0f3a2a; }
.modal-msg.error { background: var(--err-bg); color: var(--err); border: 1px solid #4a1a1a; }

.recovery-result {
  font-size: 14px;
  color: var(--text2);
  margin-top: 12px;
  display: none;
  line-height: 1.6;
}
.recovery-fallback {
  font-size: 13px;
  color: var(--text3);
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- Privacy banner (always visible) -->
<div id="privacy-banner"></div>

<!-- Payment confirmation banner (first-purchase only) -->

function fmt(str, vars) {
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] !== undefined ? vars[k] : '{' + k + '}');
}

function escapeHTML(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Month name lookup for date parsing ───────────────────────────
const MONTH_NAMES = [
  'january','february','march','april','may','june',
  'july','august','september','october','november','december'
];
const MONTH_SHORT = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

// ── Helpers ──────────────────────────────────────────────────────

function detectColType(header) {
  const h = header.trim().toLowerCase();
  for (const [type, candidates] of Object.entries(COL_MAP)) {
    for (const c of candidates) {
      if (h === c.toLowerCase()) return type;
    }
  }
  return null;
}

function buildColIndex(headers) {
  const idx = {};
  headers.forEach((h, i) => {
    const type = detectColType(h);
    if (type && idx[type] === undefined) idx[type] = i;
  });
  return idx;
}

/* Title case — capitalizes after spaces, hyphens, and apostrophes; handles Mc/Mac prefixes; Unicode-safe */
function titleCase(val) {
  if (!val) return val;
  return val.toLowerCase()
    // Capitalize first non-whitespace char after: start, space, tab, hyphen, or apostrophe
    .replace(/(^|[ \t\-'])(\S)/g, (_, sep, ch) => sep + ch.toUpperCase())
    // Re-capitalize third char for Mc- prefix names (e.g. Mcallister → McAllister)
    .replace(/\b(Mc)([a-z])/g, (_, pfx, ch) => pfx + ch.toUpperCase())
    // Re-capitalize fourth char for Mac- prefix names (e.g. Macdonald → MacDonald)
    .replace(/\b(Mac)([a-z])/g, (_, pfx, ch) => pfx + ch.toUpperCase());
}

// Particles lowercase everywhere, including field start (French, Italian, Spanish, Arabic)
const PARTICLES_ALWAYS = [
  'de la', 'de las', 'de los', 'de le',
  'della', 'degli', 'delle', 'binti', 'binte', 'ibn', 'y', 'e'
];
// Particles lowercase only after separator, not at field start (Dutch, German, Nordic)
const PARTICLES_MIDDLE = [
  'van der', 'van den', 'van de', 'von der', 'op den', 'op de',
  'van', 'von', 'de', 'di', 'du', 'da', 'del', 'des',
  'le', 'la', 'les', 'lo', 'af', 'av', 'of',
  'zu', 'zum', 'zur', 'op', 'bin'
];

/* Lowercase nobility particles at appropriate positions after title casing */
function applyNobilityParticles(s) {
  if (!s) return s;
  let r = s;
  for (const p of PARTICLES_ALWAYS) {
    const esc = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    r = r.replace(new RegExp(`(^|[ \\t\\-'])${esc}(?=[ \\-]|$)`, 'gi'), (_, sep) => sep + p);
  }
  for (const p of PARTICLES_MIDDLE) {
    const esc = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    r = r.replace(new RegExp(`([ \\t\\-'])${esc}(?=[ \\-]|$)`, 'gi'), (_, sep) => sep + p);
  }
  return r;
}

/* Phone standardization: 10-digit → (XXX) XXX-XXXX, +1XXXXXXXXXX → (XXX) XXX-XXXX, international preserved */
function standardizePhone(val) {
  if (!val) return { out: val, changed: false };
  const s = String(val).trim();
  if (!s) return { out: s, changed: false };
  // Preserve international numbers: starts with + and country code is not 1 (US/Canada)
  if (s.startsWith('+')) {
    const afterPlus = s.slice(1).replace(/\D/g, '');
    if (!afterPlus.startsWith('1')) return { out: s, changed: false };
    // Falls through: +1XXXXXXXXXX treated as US number
  }
  const digits = s.replace(/\D/g, '');
  if (digits.length === 10) {
    const out = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    return { out, changed: out !== s };
  }
  if (digits.length === 11 && digits[0] === '1') {
    const out = `(${digits.slice(1,4)}) ${digits.slice(4,7)}-${digits.slice(7)}`;
    return { out, changed: out !== s };
  }
  return { out: s, changed: false };
}

/* Date standardization — 11 common formats → YYYY-MM-DD
   locale='us' → MM/DD for ambiguous two-part numeric dates (default)
   locale='uk' → DD/MM for ambiguous two-part numeric dates
   If day part > 12 → unambiguously DD/MM regardless of locale.
   Only counts as a conversion when the value actually changes. */
function standardizeDate(val, locale) {
  if (!locale) locale = 'us';
  if (!val) return { out: val, changed: false };
  const s = String(val).trim();
  if (!s) return { out: s, changed: false };

  // ISO 8601 with time component: 2024-03-15T10:30:00Z, 2024-03-15 10:30:00, etc.
  const isoWithTime = /^(\d{4})-(\d{2})-(\d{2})[T ](\d)/;
  const isoMatch = s.match(isoWithTime);
  if (isoMatch) {
    const out = `${isoMatch[1]}-${isoMatch[2]}-${isoMatch[3]}`;
    return { out, changed: out !== s };
  }

  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return { out: s, changed: false };

  let out = null;

  // YYYY/MM/DD
  let m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (m) {
    out = `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }

  // Month name: "January 15, 2024" or "January 15 2024"
  if (!out) {
    m = s.match(/^([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})$/);
    if (m) {
      const mi = MONTH_NAMES.indexOf(m[1].toLowerCase());
      const ms = MONTH_SHORT.indexOf(m[1].toLowerCase().slice(0,3));
      const idx = mi >= 0 ? mi : ms;
      if (idx >= 0) out = `${m[3]}-${String(idx+1).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    }
  }

  // "15 January 2024" or "15 Jan 2024"
  if (!out) {
    m = s.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
    if (m) {
      const mi = MONTH_NAMES.indexOf(m[2].toLowerCase());
      const ms = MONTH_SHORT.indexOf(m[2].toLowerCase().slice(0,3));
      const idx = mi >= 0 ? mi : ms;
      if (idx >= 0) out = `${m[3]}-${String(idx+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    }
  }

  // Numeric X/Y/YYYY or X-Y-YYYY or X.Y.YYYY (4-digit year)
  if (!out) {
    m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if (m) {
      const a = parseInt(m[1],10), b = parseInt(m[2],10);
      let mon, day;
      if (a > 12) { day = a; mon = b; }       // a must be day
      else if (b > 12) { mon = a; day = b; }  // b must be day
      else if (locale === 'uk') { day = a; mon = b; }  // UK: DD/MM
      else { mon = a; day = b; }              // US: MM/DD default
      out = `${m[3]}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
  }

  // X/Y/YY (2-digit year)
  if (!out) {
    m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2})$/);
    if (m) {
      const a = parseInt(m[1],10), b = parseInt(m[2],10);
      const yr = parseInt(m[3],10) < TWO_DIGIT_YEAR_CUTOFF ? 2000 + parseInt(m[3],10) : 1900 + parseInt(m[3],10);
      let mon, day;
      if (a > 12) { day = a; mon = b; }
      else if (b > 12) { mon = a; day = b; }
      else if (locale === 'uk') { day = a; mon = b; }
      else { mon = a; day = b; }
      out = `${yr}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
  }

  if (!out) return { out: s, changed: false };
  return { out, changed: out !== s };
}

/* Validate email: must have non-empty local@domain.tld — catches no-@, starts/ends with @ */
function isValidEmail(email) {
  if (!email) return true;
  const s = String(email).trim();
  if (!s) return true;
  const atIdx = s.indexOf('@');
  if (atIdx <= 0) return false;                    // no @ or starts with @
  if (atIdx === s.length - 1) return false;        // ends with @
  if (s.indexOf('@', atIdx + 1) !== -1) return false; // multiple @
  const domain = s.slice(atIdx + 1);
  const domainParts = domain.split('.');
  return domainParts.length >= 2 && domainParts.every(p => p.length > 0);
}

/* Check if a row has no contact identity data (email, name, phone, company) */
function isRowEmpty(row, headers) {
  const identityTypes = new Set(['email', 'firstName', 'lastName', 'fullName', 'phone', 'company']);
  const identityHeaders = headers.filter(h => identityTypes.has(detectColType(h)));
  // If no identity columns detected (custom schema), don't remove — avoids destroying unknown data
  if (identityHeaders.length === 0) return false;
  return identityHeaders.every(h => !row[h] || String(row[h]).trim() === '');
}

/* Fuzzy dedup — Levenshtein on name+company string
   matchString = (firstName + ' ' + lastName + ' ' + company) or (fullName + ' ' + company)
   Truncated to 200 chars. Hard cap: 2,000 rows. */
function buildMatchString(row, headers, colIdx) {
  let s;
  if (colIdx.firstName !== undefined || colIdx.lastName !== undefined) {
    const fn = colIdx.firstName !== undefined ? (row[headers[colIdx.firstName]] || '') : '';
    const ln = colIdx.lastName  !== undefined ? (row[headers[colIdx.lastName]]  || '') : '';
    const co = colIdx.company   !== undefined ? (row[headers[colIdx.company]]   || '') : '';
    s = (fn + ' ' + ln + ' ' + co).trim().toLowerCase();
  } else if (colIdx.fullName !== undefined) {
    const fn = row[headers[colIdx.fullName]] || '';
    const co = colIdx.company !== undefined ? (row[headers[colIdx.company]] || '') : '';
    s = (fn + ' ' + co).trim().toLowerCase();
  } else {
    return null;
  }
  return s.slice(0, FUZZY_STRING_TRUNCATE);
}

function runFuzzyDedup(rows, headers, colIdx, threshold) {
  if (rows.length > FUZZY_ROW_CAP) return { pairs: [], capped: true };
  const strings = rows.map(r => buildMatchString(r, headers, colIdx));
  const pairs = [];
  for (let i = 0; i < strings.length; i++) {
    if (!strings[i]) continue;
    for (let j = i + 1; j < strings.length; j++) {
      if (!strings[j]) continue;
      const maxLen = Math.max(strings[i].length, strings[j].length);
      if (maxLen === 0) continue;
      const dist = Levenshtein.get(strings[i], strings[j]);
      const sim = 1 - dist / maxLen;
      if (sim >= threshold) {
        pairs.push({ i, j, sim: Math.round(sim * 100), a: strings[i], b: strings[j] });
      }
    }
  }
  return { pairs, capped: false };
}

/* ── Main cleaning function ─────────────────────────────────────── */
function cleanData(rawRows, rawHeaders, settings) {
  const stats = { dupes: 0, emptyRows: 0, colsRemoved: 0, dates: 0, phones: 0, dupHeaders: 0, emailsCased: 0, namesCased: 0, deletedRows: 0, invalidEmails: 0 };
  let headers = [...rawHeaders];
  let rows = rawRows.map(r => ({ ...r }));

  // 0. Salesforce: remove soft-deleted records before anything else
  if (settings.preset === 'salesforce') {
    const delCol = rawHeaders.find(h => h.toLowerCase() === 'isdeleted');
    if (delCol) {
      const before = rows.length;
      rows = rows.filter(row => {
        const v = String(row[delCol] || '').trim().toLowerCase();
        return v !== 'true' && v !== '1';
      });
      stats.deletedRows = before - rows.length;
    }
  }

  // 1. Remove duplicate column headers (keep first occurrence)
  if (settings.dupHeaders) {
    const seen = new Set();
    const keptIndices = [];
    headers.forEach((h, i) => {
      const key = h.toLowerCase();
      if (!seen.has(key)) { seen.add(key); keptIndices.push(i); }
      else stats.dupHeaders++;
    });
    if (stats.dupHeaders > 0) {
      const keptHeaders = keptIndices.map(i => headers[i]);
      rows = rows.map(row => {
        const newRow = {};
        keptHeaders.forEach(h => { newRow[h] = row[h]; });
        return newRow;
      });
      headers = keptHeaders;
    }
  }

  // 2. Remove CRM system columns
  if (settings.crmCols) {
    const removeSet = new Set(
      CRM_COLS[settings.crmCols].map(c => c.toLowerCase())
    );
    const origLen = headers.length;
    headers = headers.filter(h => !removeSet.has(h.toLowerCase()));
    stats.colsRemoved += origLen - headers.length;
    if (stats.colsRemoved > 0) {
      rows = rows.map(row => {
        const newRow = {};
        headers.forEach(h => { newRow[h] = row[h]; });
        return newRow;
      });
    }
  }

  // 3. Build column index (after header cleanup)
  const colIdx = buildColIndex(headers);

  // 4. Trim whitespace (apply first so comparisons are clean)
  if (settings.trim) {
    rows = rows.map(row => {
      const r = {};
      headers.forEach(h => { r[h] = row[h] != null ? String(row[h]).trim() : row[h]; });
      return r;
    });
  }

  // 5. Remove empty rows
  if (settings.emptyRows) {
    const before = rows.length;
    rows = rows.filter(r => !isRowEmpty(r, headers));
    stats.emptyRows += before - rows.length;
  }

  // 6. Remove exact duplicate rows
  if (settings.dedupExact) {
    const seen = new Set();
    const filtered = [];
    rows.forEach(row => {
      const key = headers.map(h => String(row[h] ?? '')).join('\x00');
      if (!seen.has(key)) { seen.add(key); filtered.push(row); }
      else stats.dupes++;
    });
    rows = filtered;
  }

  // 7. Deduplicate by email
  if (settings.dedupEmail && colIdx.email !== undefined) {
    const emailCol = headers[colIdx.email];
    const seen = new Set();
    const filtered = [];
    rows.forEach(row => {
      const email = String(row[emailCol] || '').trim().toLowerCase();
      if (!email) { filtered.push(row); return; }
      if (!seen.has(email)) { seen.add(email); filtered.push(row); }
      else stats.dupes++;
    });
    rows = filtered;
  }

  // 8. Lowercase emails
  if (settings.lowercaseEmail && colIdx.email !== undefined) {
    const emailCol = headers[colIdx.email];
    rows = rows.map(row => {
      const r = { ...row };
      if (r[emailCol]) {
        const orig = String(r[emailCol]);
        r[emailCol] = orig.toLowerCase();
        if (r[emailCol] !== orig) stats.emailsCased++;
      }
      return r;
    });
  }

  // 8b. Validate emails — remove or clear invalid addresses
  if (colIdx.email !== undefined) {
    const emailCol = headers[colIdx.email];
    const phoneCols = headers.filter(h => detectColType(h) === 'phone');
    const validRows = [];
    rows.forEach(row => {
      const email = row[emailCol] ? String(row[emailCol]).trim() : '';
      if (email && !isValidEmail(email)) {
        stats.invalidEmails++;
        const hasName =
          (colIdx.firstName !== undefined && String(row[headers[colIdx.firstName]] || '').trim()) ||
          (colIdx.lastName  !== undefined && String(row[headers[colIdx.lastName]]  || '').trim()) ||
          (colIdx.fullName  !== undefined && String(row[headers[colIdx.fullName]]  || '').trim());
        const hasPhone = phoneCols.some(col => String(row[col] || '').trim());
        if (!hasName && !hasPhone) return; // drop row — no other identity
        const r = { ...row };
        r[emailCol] = '';
        validRows.push(r);
      } else {
        validRows.push(row);
      }
    });
    rows = validRows;
  }

  // 9. Title case names
  if (settings.titleCase) {
    const nameCols = ['firstName', 'lastName', 'fullName']
      .filter(t => colIdx[t] !== undefined)
      .map(t => headers[colIdx[t]]);
    if (nameCols.length > 0) {
      rows = rows.map(row => {
        const r = { ...row };
        nameCols.forEach(col => {
          if (r[col]) {
            const orig = String(r[col]);
            r[col] = applyNobilityParticles(titleCase(orig));
            if (r[col] !== orig) stats.namesCased++;
          }
        });
        return r;
      });
    }
  }

  // 10. Standardize phone numbers (all phone-pattern columns)
  if (settings.phoneFmt) {
    const phoneCols = headers.filter(h => detectColType(h) === 'phone');
    if (phoneCols.length > 0) {
      rows = rows.map(row => {
        const r = { ...row };
        phoneCols.forEach(col => {
          if (r[col]) {
            const result = standardizePhone(r[col]);
            r[col] = result.out;
            if (result.changed) stats.phones++;
          }
        });
        return r;
      });
    }
  }

  // 11. Standardize dates
  if (settings.dateFmt) {
    const dateCols = colIdx.date !== undefined ? [headers[colIdx.date]] : [];
    // Also check all columns matching date type
    headers.forEach((h, i) => {
      if (detectColType(h) === 'date' && !dateCols.includes(h)) dateCols.push(h);
    });
    if (dateCols.length > 0) {
      rows = rows.map(row => {
        const r = { ...row };
        dateCols.forEach(col => {
          if (r[col]) {
            const result = standardizeDate(r[col], settings.dateLocale);
            r[col] = result.out;
            if (result.changed) stats.dates++;
          }
        });
        return r;
      });
    }
  }

  // 12. Remove empty columns
  if (settings.emptyCols) {
    const origLen = headers.length;
    headers = headers.filter(h => rows.some(r => r[h] && String(r[h]).trim() !== ''));
    const removed = origLen - headers.length;
    stats.colsRemoved += removed;
    if (removed > 0) {
      rows = rows.map(row => {
        const r = {};
        headers.forEach(h => { r[h] = row[h]; });
        return r;
      });
    }
  }

  return { rows, headers, stats };
}

// ── UI helpers ───────────────────────────────────────────────────
function showMsg(id, text) {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.style.display = 'block'; }
}
function hideMsg(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}
function clearMsgs() {
  ['msg-file-err','msg-file-warn','msg-file-info'].forEach(hideMsg);
}

function showSection(name) {
  ['upload-section','preview-section','download-section'].forEach(id => {
    document.getElementById(id).style.display = (id === name + '-section') ? 'block' : 'none';
  });
}

function setProgress(pct, label) {
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.setAttribute('aria-valuenow', Math.round(pct));
  if (label) document.getElementById('progress-label').textContent = label;
  document.getElementById('progress-wrap').style.display = pct < 100 ? 'block' : 'none';
}

function showOverlay(show) {
  document.getElementById('processing-overlay').style.display = show ? 'flex' : 'none';
  if (!show) {
    document.getElementById('processing-text').textContent = '';
  }
}

// ── File handling ────────────────────────────────────────────────
function handleFile(file) {
  clearMsgs();

  // Validate extension + MIME
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'xlsx' || ext === 'xls') {
    showMsg('msg-file-err', t.errXlsxFile);
    resetFileInput();
    return;
  }
  const ok = ext === 'csv' || file.type === 'text/csv' || file.type === 'text/plain';
  if (!ok) {
    showMsg('msg-file-err', t.errNotCsvWithHelp);
    resetFileInput();
    return;
  }

  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    showMsg('msg-file-err', t.errFileTooLarge);
    resetFileInput();
    return;
  }

  if (file.size > WARN_FILE_MB * 1024 * 1024) {
    showMsg('msg-file-warn', t.warnLargeFile);
  }

  state.originalFilename = file.name;

  const reader = new FileReader();
  reader.onload = e => {
    processCSVText(e.target.result, file.name);
  };
  reader.readAsText(file, 'UTF-8');
}

function handlePasteLoad() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { showMsg('msg-file-err', t.errEmpty); return; }
  clearMsgs();
  state.originalFilename = 'pasted-data.csv';
  processCSVText(text, 'pasted-data.csv');
}

function processCSVText(text, filename) {
  if (!text.trim()) { showMsg('msg-file-err', t.errEmpty); return; }

  if (typeof Papa === 'undefined') {
    showMsg('msg-file-err', t.errPapaFailed);
    return;
  }

  const result = Papa.parse(text, {
    header: true,
    skipEmptyLines: 'greedy',
    dynamicTyping: false,
    delimiter: ''
  });

  if (result.errors && result.errors.length > 0 && result.data.length === 0) {
    showMsg('msg-file-err', t.errNotCsvWithHelp);
    resetFileInput();
    return;
  }

  const rows = result.data;
  const headers = result.meta.fields;

  if (!headers || headers.length === 0) {
    showMsg('msg-file-err', t.errNoHeaders);
    resetFileInput();
    return;
  }

  if (rows.length === 0) {
    showMsg('msg-file-err', t.errEmpty);
    return;
  }

  if (headers.length === 1) {
    showMsg('msg-file-info', t.noticeOneCol);
  }

  if (rows.length > WARN_MANY_ROWS) {
    showMsg('msg-file-warn', fmt(t.warnManyRows, { n: rows.length.toLocaleString() }));
  } else if (rows.length > WARN_LARGE_ROWS) {
    showMsg('msg-file-warn', fmt(t.warnMediumRows, { n: rows.length.toLocaleString() }));
  }

  state.parsedRows = rows;
  state.parsedHeaders = headers;

  // If fuzzy toggle was already checked before this file loaded, show cap notice retroactively
  const fuzzyToggle = document.getElementById('t-fuzzy');
  const fuzzyCapNotice = document.getElementById('fuzzy-cap-notice');
  if (fuzzyToggle && fuzzyCapNotice) {
    if (fuzzyToggle.checked && rows.length > FUZZY_ROW_CAP) {
      fuzzyCapNotice.textContent = fmt(t.fuzzyCapWarning, { n: rows.length.toLocaleString() });
      fuzzyCapNotice.style.display = 'block';
    } else {
      fuzzyCapNotice.style.display = 'none';
    }
  }

  // Show file info
  const infoEl = document.getElementById('file-info');
  infoEl.innerHTML = `<span>${escapeHTML(filename)}</span> — ${rows.length.toLocaleString()} rows, ${headers.length} columns`;
  infoEl.style.display = 'block';

  // Show Quick Clean area
  document.getElementById('quick-clean-area').style.display = 'block';
}

function resetFileInput() {
  document.getElementById('file-input').value = '';
  document.getElementById('paste-area').value = '';
  document.getElementById('file-info').style.display = 'none';
  document.getElementById('quick-clean-area').style.display = 'none';
  state.parsedRows = [];
  state.parsedHeaders = [];
}

// ── Run cleaning ─────────────────────────────────────────────────
function runCleaning(settings) {
  if (state.isProcessing) return;
  if (!state.parsedRows.length) {
    // Try paste area
    const pasteVal = document.getElementById('paste-area').value.trim();
    if (pasteVal) { handlePasteLoad(); return; }
    showMsg('msg-file-err', t.errNoFileSelected);
    return;
  }

  state.isProcessing = true;
  state.settings = settings;
  state.startTime = Date.now();

  const rowCount = state.parsedRows.length;

  // Show overlay for large files
  if (rowCount > OVERLAY_ROW_THRESHOLD) {
    showOverlay(true);
    document.getElementById('processing-text').textContent = t.processingMsg;
  }

  // Use setTimeout to allow UI to render overlay
  setTimeout(() => {
    try {
      const result = cleanData(state.parsedRows, state.parsedHeaders, settings);
      state.cleanedRows = result.rows;
      state.cleanedHeaders = result.headers;
      state.cleanStats = result.stats;

      showOverlay(false);

      // Handle fuzzy dedup
      if (settings.fuzzy) {
        const colIdx = buildColIndex(state.cleanedHeaders);
        if (rowCount > FUZZY_ROW_CAP) {
          showMsg('msg-file-warn', t.fuzzySkippedCap);
          renderPreview(false);
          return;
        }
        const { pairs, capped } = runFuzzyDedup(
          state.cleanedRows, state.cleanedHeaders, colIdx, FUZZY_THRESHOLD_BAL
        );
        state.fuzzyPairs = pairs;
        if (pairs.length > 0) {
          renderFuzzyConfirm(pairs);
          renderPreview(true);
          return;
        }
      }

      renderPreview(false);
    } catch (err) {
      showOverlay(false);
      showMsg('msg-file-err', 'An error occurred while processing your file. Please try again.');
      console.error(err);
    }
  }, rowCount > OVERLAY_ROW_THRESHOLD ? 300 : 0);
}

// ── Render preview ───────────────────────────────────────────────
function renderPreview(hasFuzzy) {
  showSection('preview');

  const { cleanedRows, cleanedHeaders, parsedRows, parsedHeaders, cleanStats } = state;

  // Stats block
  const statsEl = document.getElementById('stats-block');
  statsEl.innerHTML = '';
  const addStat = (key, val) => {
    if (!val) return;
    const pill = document.createElement('div');
    pill.className = 'stat-pill';
    pill.innerHTML = `<strong>${val}</strong> ${key}`;
    statsEl.appendChild(pill);
  };

  const totalDupes = cleanStats.dupes || 0;
  const emptyRowsRemoved = cleanStats.emptyRows || 0;
  const colsRemoved = cleanStats.colsRemoved || 0;
  const datesConverted = cleanStats.dates || 0;
  const phonesFormatted = cleanStats.phones || 0;
  const emailsCased = cleanStats.emailsCased || 0;
  const namesCased = cleanStats.namesCased || 0;

  if (cleanStats.deletedRows) addStat('IsDeleted records removed', cleanStats.deletedRows);
  if (totalDupes) addStat('duplicates removed', totalDupes);
  if (emptyRowsRemoved) addStat('empty rows dropped', emptyRowsRemoved);
  if (cleanStats.invalidEmails) addStat('invalid emails cleared', cleanStats.invalidEmails);
  if (colsRemoved) addStat('columns removed', colsRemoved);
  if (datesConverted) addStat('dates converted', datesConverted);
  if (phonesFormatted) addStat('phones reformatted', phonesFormatted);
  if (emailsCased) addStat('emails normalized', emailsCased);
  if (namesCased) addStat('names normalized', namesCased);
  if (statsEl.children.length === 0) {
    const none = document.createElement('div');
    none.style.cssText = 'font-size:13px;color:var(--text3);padding:10px 4px';
    none.textContent = t.statsNoneDetected;
    statsEl.appendChild(none);
  }

  // Detect changed columns (between original first PREVIEW_MAX_ROWS rows and cleaned first PREVIEW_MAX_ROWS)
  const preview50orig = parsedRows.slice(0, PREVIEW_MAX_ROWS);
  const preview50clean = cleanedRows.slice(0, PREVIEW_MAX_ROWS);

  const changedCols = new Set();
  cleanedHeaders.forEach(h => {
    for (let i = 0; i < Math.min(preview50orig.length, preview50clean.length); i++) {
      const orig = String(preview50orig[i]?.[h] ?? '');
      const clean = String(preview50clean[i]?.[h] ?? '');
      if (orig !== clean) { changedCols.add(h); break; }
    }
    // Also: if col existed in orig but not in cleaned → removal (handled via colsRemoved)
  });

  // Also mark cols that only exist in cleanedHeaders (new) vs parsedHeaders
  const removedCols = parsedHeaders.filter(h => !cleanedHeaders.includes(h));

  const hasChanges = totalDupes > 0 || emptyRowsRemoved > 0 || colsRemoved > 0 ||
    datesConverted > 0 || phonesFormatted > 0 || changedCols.size > 0;

  // Already-clean message
  const alreadyCleanEl = document.getElementById('already-clean-msg');
  if (!hasChanges && !hasFuzzy) {
    alreadyCleanEl.textContent = t.alreadyClean;
    alreadyCleanEl.style.display = 'block';
  } else {
    alreadyCleanEl.style.display = 'none';
  }

  // Render table
  const displayHeaders = state.showAllCols ? cleanedHeaders :
    (changedCols.size > 0 ? [...changedCols] : cleanedHeaders);

  const table = document.getElementById('preview-table');
  table.innerHTML = '';

  // Header row
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  displayHeaders.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    if (changedCols.has(h)) th.style.color = 'var(--success)';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  // Body rows
  const tbody = document.createElement('tbody');
  preview50clean.forEach((row, ri) => {
    const tr = document.createElement('tr');
    displayHeaders.forEach(h => {
      const td = document.createElement('td');
      const cleanVal = String(row[h] ?? '');
      const origVal  = String(preview50orig[ri]?.[h] ?? '');
      td.textContent = cleanVal;
      if (changedCols.has(h)) {
        tr.classList.add('changed');
        if (cleanVal !== origVal) td.classList.add('changed-val');
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  // Show all toggle
  const showAllBtn = document.getElementById('show-all-btn');
  showAllBtn.textContent = state.showAllCols ? t.showChangedOnly : t.showAllCols;
  document.getElementById('preview-note-text').textContent = t.previewNote;

  document.getElementById('process-btn').textContent = t.processBtn;
  document.getElementById('start-over-btn').textContent = t.startOver;
  document.getElementById('preview-headline').textContent = t.previewHeadline;
}

// ── Process full file (transition to download) ───────────────────
function processFullFile() {
  const rowCount = state.cleanedRows.length;
  if (rowCount > PROGRESS_ROW_THRESHOLD) {
    document.getElementById('progress-wrap').style.display = 'block';
    let p = 0;
    const iv = setInterval(() => {
      p = Math.min(p + 10, 95);
      setProgress(p);
    }, 80);
    setTimeout(() => {
      clearInterval(iv);
      setProgress(100);
      setTimeout(() => showDownload(), 300);
    }, 900);
  } else {
    showDownload();
  }
}

function showDownload() {
  const sec = (Math.max((Date.now() - state.startTime) / 1000, 0.1)).toFixed(1);
  const orig  = state.parsedRows.length;
  const clean = state.cleanedRows.length;
  const removed = orig - clean;

  const isAlreadyClean = clean === orig &&
    !state.cleanStats.dupes && !state.cleanStats.emptyRows &&
    !state.cleanStats.colsRemoved && !state.cleanStats.dates && !state.cleanStats.phones &&
    !state.cleanStats.emailsCased && !state.cleanStats.namesCased;
  state.isAlreadyClean = isAlreadyClean;
  // state.isProcessing stays true until cleanAnother — guards double-click on #process-btn

  let summaryText = fmt(t.summaryLine, {
    orig: orig.toLocaleString(),
    clean: clean.toLocaleString(),
    removed: removed.toLocaleString(),
    sec
  });
  if (isAlreadyClean) summaryText += ' — ' + t.summaryNoChanges;

  document.getElementById('dl-summary').innerHTML = summaryText;
  document.getElementById('dl-csv-btn').textContent = t.downloadCsv;
  document.getElementById('excel-toggle-lbl').textContent = t.downloadXlsx;
  document.getElementById('dl-xlsx-btn').textContent = t.downloadXlsx;
  document.getElementById('clean-another-btn').textContent = t.cleanAnother;

  const allRemovedEl = document.getElementById('msg-all-rows-removed');
  if (clean === 0) {
    allRemovedEl.textContent = t.warnAllRowsRemoved;
    allRemovedEl.style.display = 'block';
  } else {
    allRemovedEl.style.display = 'none';
  }

  showSection('download');

  // Store for win redirect
  state.finalStats = { rows: clean, removed, seconds: sec };
}

// ── iOS Safari detection ─────────────────────────────────────────
function isIOSSafari() {
  return /iP(ad|hone|od)/i.test(navigator.userAgent) &&
         /WebKit/i.test(navigator.userAgent) &&
         !/CriOS|FxiOS|OPiOS|mercury/i.test(navigator.userAgent);
}

// ── CSV download ─────────────────────────────────────────────────
function downloadCSV() {
  const { cleanedRows, cleanedHeaders, originalFilename } = state;
  const csv = Papa.unparse({ fields: cleanedHeaders, data: cleanedRows });
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });

  // Filename sanitization
  const baseName = originalFilename.replace(/\.[^.]+$/, '');
  const safe = baseName.replace(/[^a-zA-Z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  const isAlreadyClean = state.isAlreadyClean;
  const suffix = isAlreadyClean ? '-verified' : '-cleaned';
  const filename = (safe || 'file') + suffix + '.csv';

  const blobUrl = URL.createObjectURL(blob);

  if (isIOSSafari()) {
    // iOS Safari: cannot reliably download blob URLs via a.download
    // Show a tap-and-hold link + manual Continue button instead
    document.getElementById('dl-csv-btn').style.display = 'none';
    const saveArea = document.getElementById('ios-save-area');
    const saveLink = document.getElementById('ios-save-link');
    saveArea.style.display = 'block';
    document.getElementById('ios-save-instruction').textContent = t.iosSaveInstruction;
    saveLink.href = blobUrl;
    saveLink.textContent = filename;
    document.getElementById('ios-continue-btn').textContent = t.iosContinueBtn;
    // win.html redirect fires only when user taps Continue
    document.getElementById('ios-continue-btn').onclick = () => {
      URL.revokeObjectURL(blobUrl);
      const { rows, removed, seconds } = state.finalStats;
      window.location.href = 'win.html?rows=' + rows +
        '&removed=' + removed +
        '&seconds=' + seconds +
        '&crm=' + encodeURIComponent(state.crmName) +
        '&changed=' + (state.isAlreadyClean ? '0' : '1');
    };
    return;
  }

  const a = document.createElement('a');
  a.href = blobUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

  // Redirect to win.html after 1 second
  const { rows, removed, seconds } = state.finalStats;
  state.redirectTimer = setTimeout(() => {
    window.location.href = 'win.html?rows=' + rows +
      '&removed=' + removed +
      '&seconds=' + seconds +
      '&crm=' + encodeURIComponent(state.crmName) +
      '&changed=' + (state.isAlreadyClean ? '0' : '1');
  }, 1000);
}

// ── Excel download ────────────────────────────────────────────────
async function downloadXLSX() {
  const btn = document.getElementById('dl-xlsx-btn');
  const errEl = document.getElementById('xlsx-error');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  errEl.style.display = 'none';

  if (typeof XLSX === 'undefined') {
    errEl.textContent = t.xlsxLoadError;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = t.downloadXlsx;
    return;
  }

  const { cleanedRows, cleanedHeaders, originalFilename } = state;
  const wsData = [cleanedHeaders, ...cleanedRows.map(r => cleanedHeaders.map(h => r[h] ?? ''))];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cleaned');

  const baseName = originalFilename.replace(/\.[^.]+$/, '');
  const safe = baseName.replace(/[^a-zA-Z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  const xlsxSuffix = state.isAlreadyClean ? '-verified' : '-cleaned';
  const filename = (safe || 'file') + xlsxSuffix + '.xlsx';

  XLSX.writeFile(wb, filename);
  btn.disabled = false;
  btn.textContent = t.downloadXlsx;

  // Redirect to win.html after 1 second
  const { rows, removed, seconds } = state.finalStats;
  state.redirectTimer = setTimeout(() => {
    window.location.href = 'win.html?rows=' + rows +
      '&removed=' + removed +
      '&seconds=' + seconds +
      '&crm=' + encodeURIComponent(state.crmName) +
      '&changed=' + (state.isAlreadyClean ? '0' : '1');
  }, 1000);
}

  // Cancel any pending redirect
  clearTimeout(state.redirectTimer);
  state.redirectTimer = null;

  // Reset all state
  state.parsedRows = [];
  state.parsedHeaders = [];
  state.cleanedRows = [];
  state.cleanedHeaders = [];
  state.originalFilename = '';
  state.fuzzyPairs = [];
  state.showAllCols = false;
  state.isAlreadyClean = false;
  state.finalStats = null;
  state.crmName = 'CSV';
  state.isProcessing = false;
  state.isDownloading = false;

  // Reset UI

  // Reset preset + toggles to defaults only when not keeping settings

    document.getElementById('crm-preset').value = 'generic';

  document.getElementById('adv-chevron').classList.remove('open');

  if (iosArea) iosArea.style.display = 'none';

  // Reset Excel toggle and any prior XLSX error

  if (ksCheckbox) ksCheckbox.checked = false;

  showSection('upload');
}

// ── Access control ───────────────────────────────────────────────
function checkAccess() {
  // Check if token already in localStorage BEFORE processing URL params
  const alreadyHadToken = !!lsGet(STORAGE_KEY);

  // Check URL param — validate format before storing
  const params = new URLSearchParams(window.location.search);
  const rawOrder = params.get('order_number');
  const orderNumber = rawOrder && /^[a-zA-Z0-9_-]{4,64}$/.test(rawOrder) ? rawOrder : null;
  if (rawOrder && !orderNumber) console.warn('order_number param failed format validation:', rawOrder);

  if (orderNumber) {
    if (!alreadyHadToken) {
      // First purchase — store token and show confirmation banner
      lsSet(STORAGE_KEY, orderNumber);
      const banner = document.getElementById('payment-banner');
      banner.textContent = t.paymentConfirmed;
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 3000);
    } else {
      lsSet(STORAGE_KEY, orderNumber);
    }
    // Clean URL
    history.replaceState(null, '', window.location.pathname);
  }

  const token = lsGet(STORAGE_KEY);
  if (token) {
    unlockTool();
  } else {
    showLocked();
  }
}

// ── Modal focus management ───────────────────────────────────────
const FOCUSABLE = 'button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), a[href], [tabindex]:not([tabindex="-1"])';

function openModal(overlayEl, triggerEl) {
  overlayEl.style.display = 'flex';
  overlayEl._triggerEl = triggerEl || null;
  const box = overlayEl.querySelector('[role="dialog"]') || overlayEl;
  const firstField = box.querySelector('input:not([type="hidden"]), select, textarea');
  const focusable = Array.from(box.querySelectorAll(FOCUSABLE));
  (firstField || (focusable.length ? focusable[0] : null))?.focus();

  function handleKey(e) {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeModal(overlayEl);
    } else if (e.key === 'Tab') {
      const els = Array.from(box.querySelectorAll(FOCUSABLE));
      if (!els.length) return;
      const first = els[0];
      const last = els[els.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }
  }
  overlayEl.addEventListener('keydown', handleKey);
  overlayEl._keyHandler = handleKey;
}

function closeModal(overlayEl) {
  overlayEl.style.display = 'none';
  if (overlayEl._keyHandler) {
    overlayEl.removeEventListener('keydown', overlayEl._keyHandler);
    overlayEl._keyHandler = null;
  }
  if (overlayEl._triggerEl) {
    overlayEl._triggerEl.focus();
    overlayEl._triggerEl = null;
  }
}

// ── Event wiring ─────────────────────────────────────────────────
function bindEvents() {
  // File input
  const fileInput = document.getElementById('file-input');
  document.getElementById('select-file-btn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  // Drag and drop
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  dropZone.addEventListener('click', () => fileInput.click());

  // Paste toggle
  document.getElementById('paste-toggle-btn').addEventListener('click', () => {
    const pa = document.getElementById('paste-area');
    const visible = pa.style.display === 'block';
    pa.style.display = visible ? 'none' : 'block';
    if (!visible) pa.focus();
  });

  // Paste area — load on any content + trigger on Quick Clean
  document.getElementById('paste-area').addEventListener('input', () => {
    const val = document.getElementById('paste-area').value.trim();
    if (val && state.parsedRows.length === 0) {
      clearMsgs();
      // Show Quick Clean area only (no parse yet — parse on Clean)
      document.getElementById('quick-clean-area').style.display = 'block';
    }
  });

  // Quick Clean
  document.getElementById('quick-clean-btn').addEventListener('click', () => {
    if (state.parsedRows.length === 0) {
      const pasteVal = document.getElementById('paste-area').value.trim();
      if (pasteVal) {
        clearMsgs();
        state.originalFilename = 'pasted-data.csv';
        processCSVText(pasteVal, 'pasted-data.csv');
        if (state.parsedRows.length === 0) return; // parse failed
      } else {
        document.getElementById('file-input').click();
        return;
      }
    }
    applyQuickCleanSettings();
    state.crmName = 'CSV';
    runCleaning(getSettings());
  });

  // Advanced settings toggle
  const advRow = document.getElementById('adv-toggle-row');
  const advSettings = document.getElementById('advanced-settings');
  const advChevron = document.getElementById('adv-chevron');
  function toggleAdv() {
    const open = advSettings.style.display === 'block';
    advSettings.style.display = open ? 'none' : 'block';
    advChevron.classList.toggle('open', !open);
    advRow.setAttribute('aria-expanded', String(!open));
  }
  advRow.addEventListener('click', toggleAdv);
  advRow.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleAdv(); } });

  // Preset change
  document.getElementById('crm-preset').addEventListener('change', e => {
    applyPreset(e.target.value);
  });

  // Date locale — load persisted value, wire save + toggle visibility with dateFmt
  const dateLocaleEl = document.getElementById('date-locale');
  const dateLocaleRow = document.getElementById('date-locale-row');
  const savedLocale = lsGet(STORAGE_DATE_LOCALE) || 'us';
  dateLocaleEl.value = savedLocale;
  dateLocaleEl.addEventListener('change', e => lsSet(STORAGE_DATE_LOCALE, e.target.value));
  document.getElementById('t-date-fmt').addEventListener('change', e => {
    dateLocaleRow.style.display = e.target.checked ? 'flex' : 'none';
  });

  // Fuzzy toggle — show upfront cap warning for large files
  document.getElementById('t-fuzzy').addEventListener('change', e => {
    const notice = document.getElementById('fuzzy-cap-notice');
    if (e.target.checked && state.parsedRows.length > FUZZY_ROW_CAP) {
      notice.textContent = fmt(t.fuzzyCapWarning, { n: state.parsedRows.length.toLocaleString() });
      notice.style.display = 'block';
    } else {
      notice.style.display = 'none';
    }
  });

  // Clean with settings
  document.getElementById('clean-settings-btn').addEventListener('click', () => {
    if (state.parsedRows.length === 0) {
      const pasteVal = document.getElementById('paste-area').value.trim();
      if (pasteVal) {
        clearMsgs();
        state.originalFilename = 'pasted-data.csv';
        processCSVText(pasteVal, 'pasted-data.csv');
        if (state.parsedRows.length === 0) return;
      } else {
        showMsg('msg-file-err', t.errNoFileSelected);
        return;
      }
    }
    const preset = document.getElementById('crm-preset').value;
    state.crmName = preset === 'generic' ? 'CSV' :
      (preset === 'hubspot' ? 'HubSpot' :
      preset === 'salesforce' ? 'Salesforce' :
      preset === 'apollo' ? 'Apollo' :
      preset === 'mailchimp' ? 'Mailchimp' : 'CSV');
    runCleaning(getSettings());
  });

  // Show all columns toggle
  document.getElementById('show-all-btn').addEventListener('click', () => {
    state.showAllCols = !state.showAllCols;
    renderPreview(state.fuzzyPairs.length > 0);
  });

  // Fuzzy confirm
  document.getElementById('fuzzy-confirm-btn').addEventListener('click', () => {
    // Remove unchecked rows
    const checkboxes = document.querySelectorAll('#fuzzy-pairs-list input[type="checkbox"]');
    const toRemove = new Set();
    checkboxes.forEach(cb => {
      if (cb.checked) {
        const pi = parseInt(cb.dataset.pair);
        toRemove.add(state.fuzzyPairs[pi].j); // keep first (i), remove second (j)
      }
    });
    state.cleanedRows = state.cleanedRows.filter((_, idx) => !toRemove.has(idx));
    state.cleanStats.dupes = (state.cleanStats.dupes || 0) + toRemove.size;
    state.fuzzyPairs = [];
    document.getElementById('fuzzy-confirm-area').style.display = 'none';
    renderPreview(false);
  });

  // Process full file
  document.getElementById('process-btn').addEventListener('click', () => {
    // If fuzzy confirm still shown, confirm first
    if (document.getElementById('fuzzy-confirm-area').style.display === 'block') {
      document.getElementById('fuzzy-confirm-btn').click();
      return;
    }
    if (state.isDownloading) return;
    state.isDownloading = true;
    processFullFile();
  });

  // Start over
  document.getElementById('start-over-btn').addEventListener('click', cleanAnother);
  document.getElementById('adjust-settings-btn').addEventListener('click', () => {
    showSection('upload');
    document.getElementById('advanced-settings').style.display = 'block';
    document.getElementById('adv-chevron').classList.add('open');
  });

  // Download CSV
  document.getElementById('dl-csv-btn').addEventListener('click', downloadCSV);

  // Excel toggle
  document.getElementById('t-excel').addEventListener('change', e => {
    const xlsxBtn = document.getElementById('dl-xlsx-btn');
    xlsxBtn.style.display = e.target.checked ? 'block' : 'none';
  });
  document.getElementById('dl-xlsx-btn').addEventListener('click', downloadXLSX);

  // Clean another
  document.getElementById('clean-another-btn').addEventListener('click', cleanAnother);

  // Already paid / restore access
  document.getElementById('already-paid-btn').addEventListener('click', () => {
    openModal(document.getElementById('recovery-modal'), document.getElementById('already-paid-btn'));
  });
  document.getElementById('lost-access-btn').addEventListener('click', () => {
    openModal(document.getElementById('recovery-modal'), document.getElementById('lost-access-btn'));
  });

  // Recovery modal
  document.getElementById('recovery-close').addEventListener('click', () => {
    closeModal(document.getElementById('recovery-modal'));
  });
  document.getElementById('recovery-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('recovery-modal')) {
      closeModal(document.getElementById('recovery-modal'));
    }
  });
  document.getElementById('recovery-submit-btn').addEventListener('click', () => {
    const raw = document.getElementById('recovery-email-input').value.trim();
    const errorEl = document.getElementById('recovery-email-error');
    errorEl.style.display = 'none';
    if (!raw) return;
    // Strip leading # then validate format
    const token = raw.replace(/^#/, '');
    if (!/^[a-zA-Z0-9_-]{4,64}$/.test(token)) {
      errorEl.textContent = t.recoveryEmailInvalid;
      errorEl.style.display = 'block';
      return;
    }
    lsSet(STORAGE_KEY, token);
    const resultEl = document.getElementById('recovery-result');
    resultEl.style.display = 'block';
    resultEl.textContent = t.recoveryMsg;
    setTimeout(() => window.location.reload(), 1200);
  });

  // Feedback button
  document.getElementById('feedback-btn').addEventListener('click', () => {
    openModal(document.getElementById('feedback-modal'), document.getElementById('feedback-btn'));
  });

  // Feedback modal close
  document.getElementById('feedback-close').addEventListener('click', () => {
    closeModal(document.getElementById('feedback-modal'));
  });
  document.getElementById('feedback-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('feedback-modal')) {
      closeModal(document.getElementById('feedback-modal'));
    }
  });

  // Feedback message char count + submit enable
  const fbMsg = document.getElementById('fb-msg');
  fbMsg.addEventListener('input', () => {
    const len = fbMsg.value.length;
    document.getElementById('fb-char-hint').textContent = len + '/500';
    updateFbSubmit();
  });
  document.getElementById('fb-type').addEventListener('change', updateFbSubmit);

  function updateFbSubmit() {
    const hasType = document.getElementById('fb-type').value !== '';
    const msgLen = document.getElementById('fb-msg').value.length;
    document.getElementById('fb-submit-btn').disabled = !(hasType && msgLen >= 10);
  }

  // Feedback submit
  document.getElementById('fb-submit-btn').addEventListener('click', async () => {
    const btn = document.getElementById('fb-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    const msgResult = document.getElementById('fb-msg-result');
    msgResult.style.display = 'none';

    const payload = {
      type: document.getElementById('fb-type').value,
      message: document.getElementById('fb-msg').value,
      email: document.getElementById('fb-email').value || undefined
    };

    try {
      const res = await fetch(FORMSPARK_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        msgResult.textContent = t.feedbackSuccess;
        msgResult.className = 'modal-msg success';
        msgResult.style.display = 'block';
        setTimeout(() => {
          closeModal(document.getElementById('feedback-modal'));
          // Reset form
          document.getElementById('fb-type').value = '';
          document.getElementById('fb-msg').value = '';
          document.getElementById('fb-email').value = '';
          document.getElementById('fb-char-hint').textContent = '0/500';
          msgResult.style.display = 'none';
          btn.textContent = t.feedbackSubmit;
        }, 3000);
      } else {
        throw new Error('Non-OK response');
      }
    } catch {
      msgResult.textContent = t.feedbackErrorWithContact;
      msgResult.className = 'modal-msg error';
      msgResult.style.display = 'block';
      btn.disabled = false;
      btn.textContent = t.feedbackSubmit;
    }
  });

  // Cookie notice
  const COOKIE_KEY = 'cleanlist_cookie_dismissed';
  if (!lsGet(COOKIE_KEY)) {
    document.getElementById('cookie-notice').style.display = 'flex';
  }
  document.getElementById('cookie-dismiss').addEventListener('click', () => {
    lsSet(COOKIE_KEY, '1');
    document.getElementById('cookie-notice').style.display = 'none';
  });
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  populateI18n();
  bindEvents();
  checkAccess();
  // Ensure upload section visible on tool load
  showSection('upload');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
